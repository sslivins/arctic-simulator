name: Build

on:
  push:
    branches: [main]
    paths:
      - 'main/**'
      - 'CMakeLists.txt'
      - 'sdkconfig.defaults'
      - 'partitions.csv'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'main/**'
      - 'CMakeLists.txt'
      - 'sdkconfig.defaults'
      - 'partitions.csv'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.4.3
    steps:
      - uses: actions/checkout@v4

      - name: Build
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target esp32s3
          idf.py build

      - name: Check binary size
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py size
